<!DOCTYPE html>

<head>

  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="يلاااا بيناا نلعب">
  <meta name="description" content="لعبة جماعية تفاعلية - دور العجلة واهزم لعبة الحياة">

  <title>يلاااا بيناا نلعب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { tajawal: ['Tajawal', 'sans-serif'] },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'bounce-in': 'bounceIn 0.5s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            bounceIn: { '0%': { opacity: '0', transform: 'scale(0.3)' }, '50%': { transform: 'scale(1.05)' }, '70%': { transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; }
    .screen { display: none; }
    .screen.active { display: flex; }
    .wheel-pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 28px solid #ef4444;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .wheel-pointer::after {
      content: '';
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 20px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(239,68,68,0.4);
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      animation: fadeIn 0.2s ease-out;
    }
    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .glow-indigo { box-shadow: 0 0 30px rgba(99,102,241,0.15), 0 0 60px rgba(99,102,241,0.08); }
    #resultArea.show { display: block; animation: slideUp 0.4s ease-out; }
    select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236366f1' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: left 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
    }
    .settings-btn { background: none; border: none; cursor: pointer; color: #6366f1; transition: transform 0.2s, color 0.2s; }
    .settings-btn:hover { transform: rotate(45deg); color: #4f46e5; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: white; border-radius: 1.5rem; padding: 2rem; max-width: 420px; width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25); animation: slideUp 0.3s ease-out;
    }
    .suggestion-chip {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
      border-radius: 50px; font-size: 12px; background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
    }
    .back-arrow { transition: transform 0.2s; }
    html[dir="ltr"] .back-arrow { transform: rotate(0deg) !important; }
    html[dir="rtl"] .back-arrow { transform: rotate(180deg); }
    @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 200; animation: confetti-fall 3s ease-out forwards; pointer-events: none; }
    @keyframes winner-glow { 0%, 100% { box-shadow: 0 0 5px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 30px rgba(99,102,241,0.6), 0 0 60px rgba(99,102,241,0.3); } }
    .winner-glow { animation: winner-glow 1.5s ease-in-out infinite; }
    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 150; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 font-tajawal min-h-screen">

  <!-- ===== SCREEN 1: HOME ===== -->
  <div id="homeScreen" class="screen active flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-600 via-purple-600 to-indigo-800 opacity-95"></div>
    <div class="absolute top-10 left-10 w-72 h-72 bg-indigo-400 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-purple-400 rounded-full blur-3xl opacity-20"></div>
    <button onclick="toggleLang()" class="lang-toggle absolute top-4 left-4 z-20 bg-white/20 backdrop-blur-md border border-white/30 text-white font-bold text-sm w-10 h-10 rounded-full hover:bg-white/30 transition-all active:scale-95">EN</button>
    <div class="relative z-10 flex flex-col items-center text-center max-w-lg mx-auto">
      <div class="mb-2 inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/20 backdrop-blur-md border border-white/30 overflow-hidden">
        <img src="icon-192.jpg" alt="أيقونة" class="w-full h-full object-cover">
      </div>
      <h1 class="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight" style="text-shadow: 0 2px 20px rgba(0,0,0,0.2);" data-i18n="homeTitle"></h1>
      <p class="text-xl md:text-2xl font-bold text-indigo-200 mb-10" data-i18n="homeSubtitle"></p>
      <div class="flex flex-col sm:flex-row gap-5 w-full max-w-md">
        <button onclick="selectFamily()" class="flex-1 group relative overflow-hidden bg-gradient-to-br from-emerald-500 to-emerald-700 text-white text-xl font-bold py-6 px-8 rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-200 active:scale-95 border border-emerald-400/30">
          <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
          <span class="relative" data-i18n="familyBtn"></span>
        </button>
        <button onclick="selectFriends()" class="flex-1 group relative overflow-hidden bg-gradient-to-br from-indigo-500 to-indigo-700 text-white text-xl font-bold py-6 px-8 rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-200 active:scale-95 border border-indigo-400/30">
          <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
          <span class="relative" data-i18n="friendsBtn"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 2A: FAMILY SETUP ===== -->
  <div id="familyScreen" class="screen flex-col items-center min-h-screen p-4 md:p-6">
    <div class="w-full max-w-lg">
      <div class="flex items-center justify-between mb-4">
        <button onclick="goHome()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-bold text-lg transition-colors">
          <svg class="back-arrow w-5 h-5 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          <span data-i18n="back"></span>
        </button>
        <button onclick="toggleLang()" class="lang-toggle bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold text-xs w-9 h-9 rounded-full transition-all active:scale-95 flex items-center justify-center">EN</button>
      </div>
      <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-indigo-100">
        <h2 class="text-2xl md:text-3xl font-black text-indigo-700 mb-2" data-i18n="familySetup"></h2>
        <p class="text-slate-500 mb-6" data-i18n="familySetupDesc"></p>
        <div class="mb-6">
          <label class="block text-slate-700 font-bold mb-2" data-i18n="familyCount"></label>
          <div class="flex items-center gap-3">
            <button onclick="changeFamilyCount(-1)" class="w-10 h-10 rounded-xl bg-indigo-100 text-indigo-700 font-bold text-xl hover:bg-indigo-200 transition-colors flex items-center justify-center">-</button>
            <span id="familyCountDisplay" class="text-2xl font-black text-indigo-700 w-10 text-center">1</span>
            <button onclick="changeFamilyCount(1)" class="w-10 h-10 rounded-xl bg-indigo-100 text-indigo-700 font-bold text-xl hover:bg-indigo-200 transition-colors flex items-center justify-center">+</button>
          </div>
        </div>
        <div id="familySections" class="space-y-4 mb-6"></div>
        <div class="flex gap-3">
          <button onclick="addMemberToCurrentFamily()" class="flex-1 bg-gradient-to-l from-emerald-500 to-emerald-600 text-white font-bold py-3 px-6 rounded-2xl hover:from-emerald-600 hover:to-emerald-700 transition-all duration-200 active:scale-95 shadow-lg shadow-emerald-200" data-i18n="addMember"></button>
          <button onclick="startGameFromFamily()" class="flex-1 bg-gradient-to-l from-indigo-500 to-indigo-600 text-white font-bold py-3 px-6 rounded-2xl hover:from-indigo-600 hover:to-indigo-700 transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-200" data-i18n="startGame"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 2B: FRIENDS SETUP ===== -->
  <div id="friendsScreen" class="screen flex-col items-center min-h-screen p-4 md:p-6">
    <div class="w-full max-w-lg">
      <div class="flex items-center justify-between mb-4">
        <button onclick="goHome()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-bold text-lg transition-colors">
          <svg class="back-arrow w-5 h-5 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          <span data-i18n="back"></span>
        </button>
        <button onclick="toggleLang()" class="lang-toggle bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold text-xs w-9 h-9 rounded-full transition-all active:scale-95 flex items-center justify-center">EN</button>
      </div>
      <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-indigo-100">
        <h2 class="text-2xl md:text-3xl font-black text-indigo-700 mb-2" data-i18n="friendsSetup"></h2>
        <p class="text-slate-500 mb-6" data-i18n="friendsSetupDesc"></p>
        <div class="mb-6">
          <label class="block text-slate-700 font-bold mb-2" data-i18n="ageRange"></label>
          <select id="ageRangeSelect" onchange="updateAgeRange()" class="w-full p-3 rounded-2xl border-2 border-indigo-200 focus:border-indigo-500 focus:outline-none bg-white text-slate-800 font-bold text-base transition-colors cursor-pointer pr-4 appearance-none">
            <option value="kids" data-i18n="ageKids">أطفال (6-12)</option>
            <option value="teens" data-i18n="ageTeens">مراهقين (13-17)</option>
            <option value="youth" selected data-i18n="ageYouth">شباب (18-29)</option>
            <option value="adults" data-i18n="ageAdults">بالغين (30+)</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="block text-slate-700 font-bold mb-2" data-i18n="addFriend"></label>
          <div class="flex gap-2">
            <input id="friendNameInput" onkeydown="if(event.key==='Enter')addFriend()" data-i18n-placeholder="friendPlaceholder" placeholder="اكتب الاسم..." class="flex-1 p-3 rounded-2xl border-2 border-indigo-200 focus:border-indigo-500 focus:outline-none text-slate-800 text-base transition-colors">
            <button onclick="addFriend()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-5 rounded-2xl transition-all duration-200 active:scale-95 shadow-lg shadow-emerald-200 flex items-center gap-1" data-i18n="addFriendShort"></button>
          </div>
        </div>
        <div id="friendsTags" class="flex flex-wrap gap-2 mb-6 min-h-[40px]"></div>
        <button onclick="startGameFromFriends()" class="w-full bg-gradient-to-l from-indigo-500 to-indigo-600 text-white font-bold py-3 px-6 rounded-2xl hover:from-indigo-600 hover:to-indigo-700 transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-200" data-i18n="startGame"></button>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 3: GAME ===== -->
  <div id="gameScreen" class="screen flex-col items-center min-h-screen p-4 md:p-6">
    <div class="w-full max-w-lg">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <button onclick="goHome()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-bold transition-colors">
            <svg class="back-arrow w-5 h-5 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            <span data-i18n="exit"></span>
          </button>
          <button onclick="toggleLang()" class="lang-toggle bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold text-xs w-9 h-9 rounded-full transition-all active:scale-95 flex items-center justify-center">EN</button>
        </div>
        <div class="flex items-center gap-2">
          <span id="playerCountBadge" class="bg-indigo-100 text-indigo-700 font-bold px-4 py-1.5 rounded-full text-sm"></span>
        </div>
      </div>
      <div class="bg-white rounded-3xl shadow-xl p-4 md:p-6 border border-indigo-100">
        <h2 class="text-xl md:text-2xl font-black text-indigo-700 text-center mb-2" data-i18n="gameTitle"></h2>
        <p class="text-slate-500 text-center text-sm mb-4" data-i18n="gameDesc"></p>
        <div class="relative flex justify-center mb-4" id="wheelContainer">
          <div class="wheel-pointer" id="wheelPointer"></div>
          <canvas id="wheelCanvas" class="glow-indigo rounded-full"></canvas>
          <div id="spinOverlay" class="absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm rounded-full opacity-0 pointer-events-none transition-opacity duration-300 z-10">
            <div class="text-center">
              <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
              <p class="text-indigo-700 font-bold text-lg" data-i18n="spinning"></p>
            </div>
          </div>
        </div>
        <button id="spinButton" onclick="spinWheel()" class="w-full bg-gradient-to-l from-amber-500 to-orange-600 text-white font-bold text-xl py-4 px-6 rounded-2xl hover:from-amber-600 hover:to-orange-700 transition-all duration-200 active:scale-95 shadow-lg shadow-amber-200 btn-spin mb-2" data-i18n="spinBtn"></button>
        <!-- SUGGESTION BAR (always visible) -->
        <div class="mb-3 bg-white rounded-2xl p-4 border border-amber-200 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-5 h-5 text-amber-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636a9 9 0 11-12.728 0M21 12a9 9 0 11-18 0"/></svg>
            <span class="text-amber-800 font-bold text-sm" data-i18n="suggestTitle"></span>
            <span id="suggestionCount" class="suggestion-chip text-xs"></span>
          </div>
          <div class="flex gap-2">
            <input id="suggestionInput" onkeydown="if(event.key==='Enter')submitSuggestion()" data-i18n-placeholder="suggestPlaceholder" placeholder="اكتب اقتراحك هنا..." class="flex-1 p-2.5 rounded-xl border-2 border-amber-200 focus:border-amber-400 focus:outline-none text-sm transition-colors">
            <button onclick="submitSuggestion()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-4 rounded-xl transition-all duration-200 active:scale-95 text-sm" data-i18n="suggestBtn"></button>
          </div>
          <div id="suggestionsList" class="flex flex-wrap gap-1.5 mt-2 min-h-[28px]"></div>
        </div>
        <div id="resultArea" class="hidden">
          <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl p-6 border border-indigo-100 text-center">
            <p class="text-slate-500 font-bold text-sm mb-1" data-i18n="winnerIs"></p>
            <p id="winnerName" class="text-2xl md:text-3xl font-black text-indigo-700 mb-3"></p>
            <div class="w-16 h-1 bg-gradient-to-l from-indigo-500 to-purple-500 rounded-full mx-auto mb-3"></div>
            <div id="challengeDisplay">
              <p id="challengeText" class="text-lg md:text-xl font-bold text-slate-800 leading-relaxed mb-3"></p>
            </div>
            <div class="flex gap-3">
              <button onclick="spinWheel()" class="flex-1 bg-gradient-to-l from-emerald-500 to-emerald-600 text-white font-bold py-3 px-4 rounded-2xl hover:from-emerald-600 hover:to-emerald-700 transition-all duration-200 active:scale-95 shadow-lg shadow-emerald-200" data-i18n="spinAgain"></button>
              <button onclick="goHome()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-2xl transition-all duration-200 active:scale-95" data-i18n="homeBtn"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

    function applyLanguage() {
      var elements = document.querySelectorAll('[data-i18n]');
      for (var ei = 0; ei < elements.length; ei++) {
        var el = elements[ei];
        var key = el.getAttribute('data-i18n');

      var titleEls = document.querySelectorAll('[data-i18n-title]');

      var inputs = document.querySelectorAll('[data-i18n-placeholder]');

      var toggleBtns = document.querySelectorAll('.lang-toggle');

    // ===== CANVAS / WHEEL =====
    var canvasSize = 0;

    function setupCanvas() {
      var canvas = document.getElementById('wheelCanvas');
      var maxW = Math.min(window.innerWidth - 64, 400);
      var sz = Math.max(240, maxW);
      canvasSize = sz;
      var dpr = window.devicePixelRatio || 1;
      canvas.width = sz * dpr;
      canvas.height = sz * dpr;
      canvas.style.width = sz + 'px';
      canvas.style.height = sz + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
    }

    function drawWheel() {
      var canvas = document.getElementById('wheelCanvas');
      var ctx = canvas.getContext('2d');
      var n = state.players.length;
      if (n === 0) return;
      var cx = canvasSize / 2;
      var cy = canvasSize / 2;
      var radius = canvasSize / 2 - 12;
      var sliceAngle = (2 * Math.PI) / n;
      ctx.clearRect(0, 0, canvasSize, canvasSize);
      for (var i = 0; i < n; i++) {
        var startAngle = -Math.PI / 2 + i * sliceAngle + state.currentRotation;
        var endAngle = startAngle + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
        var midAngle = startAngle + sliceAngle / 2;
        var fontSize = Math.max(10, Math.min(16, sliceAngle * 22));
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(midAngle);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold ' + fontSize + 'px Tajawal';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        var textRadius = radius * 0.58;
        var displayName = state.players[i].name;
        if (displayName.length > 10) displayName = displayName.slice(0, 9) + '..';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 4;
        ctx.fillText(displayName, textRadius, 0);
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.12, 0, 2 * Math.PI);
      ctx.fillStyle = '#1e293b';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.06, 0, 2 * Math.PI);
      ctx.fillStyle = '#f59e0b';
      ctx.fill();
      for (var di = 0; di < 16; di++) {
        var angle = (di / 16) * 2 * Math.PI;
        var dx = cx + (radius + 6) * Math.cos(angle);
        var dy = cy + (radius + 6) * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(dx, dy, 2.5, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
      }
    }

    // ===== SPIN LOGIC =====
    var spinAnimationId = null;

    function spinWheel() {
      if (state.isSpinning) return;
      if (state.players.length < 2) { alert(t('needTwoSpin')); return; }
      if (state.usedPlayerIndices.length >= state.players.length) {
        state.usedPlayerIndices = [];
      }
      var available = [];
      for (var pi = 0; pi < state.players.length; pi++) {
        if (state.usedPlayerIndices.indexOf(pi) === -1) available.push(pi);
      }
      var targetIdx = available[Math.floor(Math.random() * available.length)];
      state.usedPlayerIndices.push(targetIdx);
      var n = state.players.length;
      var sliceAngle = (2 * Math.PI) / n;
      var targetAngle = -(targetIdx * sliceAngle + sliceAngle / 2);
      var numExtraRotations = 5 + Math.floor(Math.random() * 4);
      var targetRotation = targetAngle + numExtraRotations * 2 * Math.PI;
      while (targetRotation <= state.currentRotation) targetRotation += 2 * Math.PI;
      document.getElementById('winnerName').classList.remove('winner-glow');
      state.isSpinning = true;
      document.getElementById('spinButton').disabled = true;
      document.getElementById('resultArea').classList.add('hidden');
      document.getElementById('resultArea').classList.remove('show');
      startTickDuringSpin();
      var overlay = document.getElementById('spinOverlay');
      overlay.style.opacity = '1';
      overlay.style.pointerEvents = 'auto';
      var startRotation = state.currentRotation;
      var duration = 3000;
      var startTime = performance.now();
      function animate(time) {
        var elapsed = time - startTime;
        var progress = Math.min(elapsed / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        state.currentRotation = startRotation + (targetRotation - startRotation) * eased;
        drawWheel();
        if (progress < 1) {
          spinAnimationId = requestAnimationFrame(animate);
        } else {
          state.currentRotation = targetRotation;
          drawWheel();
          overlay.style.opacity = '0';
          overlay.style.pointerEvents = 'none';
          state.isSpinning = false;
          document.getElementById('spinButton').disabled = false;
          stopTickSound();
          showResult();
        }
      }
      spinAnimationId = requestAnimationFrame(animate);
    }

    function getWinnerIndex() {
      var n = state.players.length;
      var sliceAngle = (2 * Math.PI) / n;
      var raw = (-Math.PI / 2 - state.currentRotation) % (2 * Math.PI);
      var normalizedAngle = ((raw % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      var adjustedAngle = (normalizedAngle + Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI);
      return Math.floor(adjustedAngle / sliceAngle) % n;
    }

    function getQuestion() {
      var category = state.ageRange || 'family';
      if (state.mode === 'family') category = 'family';
      var langDb = CHALLENGES[currentLang] || CHALLENGES.ar;
      var qKey = category + '_question';
      var pool = (langDb[qKey] || langDb.family_question).slice();
      var funnyPool = langDb.funny || [];
      var shuffledF = funnyPool.slice().sort(function() { return Math.random() - 0.5; });
      for (var fi = 0; fi < Math.min(3, shuffledF.length); fi++) pool.push(shuffledF[fi]);
      if (state.suggestions.length > 0 && Math.random() < 0.3) {
        return state.suggestions[Math.floor(Math.random() * state.suggestions.length)];
      }
      var available = [];
      for (var qi = 0; qi < pool.length; qi++) {
        if (state.usedQuestions.indexOf(pool[qi]) === -1) available.push(pool[qi]);
      }
      if (available.length === 0) {
        state.usedQuestions = [];
        available = pool.slice();
      }
      var chosen = available[Math.floor(Math.random() * available.length)];
      state.usedQuestions.push(chosen);
      return chosen;
    }

    function showResult() {
      var winnerIdx = getWinnerIndex();
      var winner = state.players[winnerIdx];
      document.getElementById('winnerName').textContent = winner.name;
      document.getElementById('winnerName').classList.add('winner-glow');
      document.getElementById('challengeText').textContent = getQuestion();
      var resultArea = document.getElementById('resultArea');
      resultArea.classList.remove('hidden');
      resultArea.classList.add('show');
      updateSuggestionCount();
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      launchConfetti();
      playCelebrationSound();
    }

    // ===== (AI generation removed) =====

    // ===== SOUND & VISUAL EFFECTS =====
    var audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    var tickInterval = null;

    function playTickSound() {
      try {
        var ctx = getAudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 800 + Math.random() * 200;
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.05);
      } catch(e) {}
    }

    function startTickDuringSpin() {
      tickInterval = setInterval(function() {
        try {
          var ctx = getAudioCtx();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = 600 + Math.random() * 300;
          gain.gain.setValueAtTime(0.06, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.03);
        } catch(e) {}
      }, 100);
    }

    function stopTickSound() {
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
    }

    function playCelebrationSound() {
      try {
        var ctx = getAudioCtx();
        var notes = [523.25, 587.33, 659.25, 783.99, 1046.5];
        notes.forEach(function(freq, i) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
          osc.start(ctx.currentTime + i * 0.12);
          osc.stop(ctx.currentTime + i * 0.12 + 0.3);
        });
      } catch(e) {}
    }

    function launchConfetti() {
      var canvas = document.createElement('canvas');
      canvas.id = 'confettiCanvas';
      document.body.appendChild(canvas);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var ctx = canvas.getContext('2d');
      var pieces = [];
      var colors = ['#6366f1', '#10b981', '#8b5cf6', '#f59e0b', '#ef4444', '#06b6d4', '#ec4899', '#f97316'];
      for (var ci = 0; ci < 120; ci++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: -20 - Math.random() * canvas.height,
          w: 6 + Math.random() * 6,
          h: 6 + Math.random() * 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 3,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10,
          opacity: 1,
        });
      }
      var confettiStart = performance.now();
      function drawConfetti(time) {
        var elapsed = time - confettiStart;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var allDone = true;
        for (var pi = 0; pi < pieces.length; pi++) {
          var p = pieces[pi];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.05;
          p.rot += p.rotSpeed;
          if (elapsed > 2000) p.opacity = Math.max(0, p.opacity - 0.02);
          if (p.opacity > 0) {
            allDone = false;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();

        '<button id="pwaDismissBtn" class="text-white/50 hover:text-white transition-colors text-xl leading-none">&times;</button>';
      div.querySelector('#pwaInstallBtn').onclick = function() {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() { deferredPrompt = null; div.remove(); });
